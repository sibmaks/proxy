plugins {
    id 'java'
    id 'application'
}

group = 'io.github.sibmaks'
version = '1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(19)
    }
}

application {
    mainClass = 'io.github.sibmaks.ClientProxy'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

task runClientProxy(type: JavaExec, dependsOn: classes) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'io.github.sibmaks.ClientProxy'
    if (project.hasProperty('listenPort')) args '--listenPort', project.listenPort
    if (project.hasProperty('serverHost')) args '--serverHost', project.serverHost
    if (project.hasProperty('serverPort')) args '--serverPort', project.serverPort
}

task runRemoteProxyServer(type: JavaExec, dependsOn: classes) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'io.github.sibmaks.RemoteProxyServer'
    if (project.hasProperty('listenPort')) args '--listenPort', project.listenPort
}
